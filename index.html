<div><select id="rangeFilter"><option value="strict">嚴格：分數±1.0 或序位±3000</option><option value="normal" selected>一般：分數±1.5 或序位±5000</option><option value="wide">放寬：分數±2.5 或序位±8000</option><option value="all">顯示全部</option></select></div>
<div><button onclick="render()">更新分析</button></div>
</div>
<div class="note" style="margin-top:10px">本版不再用「最接近」排序，而是用「可參考範圍內，由高到低」排序。這樣 21.6 / 14610 會比之前更符合：中正、陽明、永平這種直覺順序。</div>
</section>

班/歷史資料"], ["中和生活圈"]]];
var samples = [["22.6", "男", "國A", "12530～12675", "6894～7009"], ["21.6", "男", "未完整提供", "14610～14735", "7953～8052"], ["21.6", "女", "國B、數B+、英A、社A、自B、作文4", "14484～14609", "6561～6660"], ["20.8", "未提供", "國B++、數B++、英B+、社A、自B++、作文5", "14997～15120", "—"], ["20.6", "男", "國B、數B++、英A++", "15948～16070", "8662～8761"], ["18.8", "女", "國B、數B、英A、社A、自B、作文5", "17616～17745", "8106～8205"]];

function fmt(n){ if(n===null || isNaN(n)) return '—'; return Math.round(n).toLocaleString('zh-TW'); }
function mid(a,b){ return Math.round((Number(a)+Number(b))/2); }
function scoreMid(s){ return Math.round(((Number(s[3])+Number(s[4]))/2)*10)/10; }
function scoreDiffText(d){ if(d===null || isNaN(d)) return '—'; return (d>=0?'+':'')+Number(d).toFixed(1); }
function normKw(s){ return String(s||'').replace(/區/g,'').trim(); }
function statusByRank(d){
  if(d===null || isNaN(d)) return '—';
  var ad=Math.abs(d);
  if(ad<=500) return '<span class="good">非常接近</span>';
  if(ad<=1000) return '<span class="mid">接近</span>';
  if(ad<=3000) return '<span class="mid">可參考</span>';
  return '<span class="warn">距離較遠</span>';
}
function composite(row,score,rank){
  var rm=mid(row[6],row[7]), sm=scoreMid(row);
  var rd = isNaN(rank)?null:rm-rank;
  var sd = isNaN(score)?null:score-sm;
  var trust = Number(row[11]||60);
  var rankScore = rd===null ? 50 : Math.max(0,100-Math.abs(rd)/50);
  var scoreScore = sd===null ? 50 : Math.max(0,100-Math.abs(sd)*35);
  var final = Math.round(rankScore*0.45 + scoreScore*0.35 + trust*0.20);
  return {rm:rm, sm:sm, rd:rd, sd:sd, trust:trust, final:final, raw:row};
}
function thresholds(){
  var v=rangeFilter.value;
  if(v==='strict') return {score:1.0, rank:3000, all:false};
  if(v==='wide') return {score:2.5, rank:8000, all:false};
  if(v==='all') return {score:999, rank:999999, all:true};
  return {score:1.5, rank:5000, all:false};
}
function allRows(){
  var score=parseFloat(scoreInput.value);
  var rank=parseInt(rankInput.value);
  var kw=normKw(keyword.value);
  var arr=[];
  for(var i=0;i<schools.length;i++){
    var s=schools[i], text=normKw(s.join(' '));
    if(!kw || text.indexOf(kw)>=0) arr.push(composite(s,score,rank));
  }
  return arr;
}
function isRelevant(x, t){
  if(t.all) return true;
  var hasScore = !(x.sd===null || isNaN(x.sd));
  var hasRank = !(x.rd===null || isNaN(x.rd));
  if(!hasScore && !hasRank) return true;
  return (hasScore && Math.abs(x.sd)<=t.score) || (hasRank && Math.abs(x.rd)<=t.rank);
}
function rowHtml(x,i){
  var s=x.raw, rd=x.rd, sd=x.sd;
  var diffClass = rd===null || isNaN(rd) ? '' : (rd>=0?'diffp':'diffn');
  var diffText = rd===null || isNaN(rd) ? '—' : (rd>=0?'+':'')+fmt(rd);
  var tags = '';
  for(var j=0;j<s[13].length;j++){ tags += '<span class="tag">'+s[13][j]+'</span>'; }
  return '<tr>'
    + '<td class="num">'+(i+1)+'</td>'
    + '<td><b>'+s[1]+'</b><br>'+tags+'</td>'
    + '<td class="num score">'+s[2]+'</td>'
    + '<td class="num">'+s[5]+'<br><span class="muted">中位 '+fmt(x.rm)+'</span></td>'
    + '<td class="num '+diffClass+'">'+diffText+'</td>'
    + '<td class="num">'+scoreDiffText(sd)+'</td>'
    + '<td>'+statusByRank(rd)+'</td>'
    + '<td class="num"><b>'+x.final+'</b><br><span class="muted">信度 '+x.trust+'%</span></td>'
    + '<td class="num hide-sm">'+s[8]+'</td>'
    + '<td class="hide-sm">'+s[9]+'</td>'
    + '<td class="hide-sm">'+s[12].join('、')+'</td>'
    + '</tr>';
}
function tableHtml(rows, limit){
  if(rows.length===0) return '沒有符合條件的學校。';
  var out='<table><tr><th>#</th><th>學校</th><th>分數區間</th><th>序位區間</th><th>序位差</th><th>分數差</th><th>距離感</th><th>綜合評分</th><th class="hide-sm">招生</th><th class="hide-sm">行政區</th><th class="hide-sm">來源</th></tr>';
  var n = limit ? Math.min(limit, rows.length) : rows.length;
  for(var i=0;i<n;i++) out += rowHtml(rows[i], i);
  out += '</table>';
  return out;
}
function render(){
  var score=parseFloat(scoreInput.value), rank=parseInt(rankInput.value), t=thresholds();
  var rows=allRows();
  var refRows=rows.filter(function(x){ return isRelevant(x,t); });
  refRows.sort(function(a,b){
    return a.rm-b.rm || b.final-a.final;
  });
  nearTable.innerHTML = tableHtml(refRows,30);
  rows.sort(function(a,b){ return a.raw[0]-b.raw[0]; });
  mainTable.innerHTML = tableHtml(rows,0);
  if(!isNaN(score)||!isNaN(rank)){
    summaryCard.style.display='block';
    summary.innerHTML='<div class="box"><div class="muted">輸入積分</div><div class="big">'+(isNaN(score)?'—':score)+'</div></div>'
    +'<div class="box"><div class="muted">輸入序位</div><div class="big">'+(isNaN(rank)?'—':fmt(rank))+'</div></div>'
    +'<div class="box"><div class="muted">最高排序學校</div><div class="big">'+(refRows[0]?refRows[0].raw[1]:'—')+'</div></div>'
    +'<div class="box"><div class="muted">可參考校數</div><div class="big">'+refRows.length+'</div></div>';
  }
}
function renderSamples(){
  var out='<table><tr><th>積分</th><th>性別</th><th>五科／作文</th><th>總排</th><th>性別序位</th></tr>';
  for(var i=0;i<samples.length;i++){
    var s=samples[i];
    out += '<tr><td class="num">'+s[0]+'</td><td>'+s[1]+'</td><td>'+s[2]+'</td><td class="num">'+s[3]+'</td><td class="num">'+s[4]+'</td></tr>';
  }
  out += '</table>';
  sampleTable.innerHTML=out;
}
render(); renderSamples();
</script>
