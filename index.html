<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ben Model V17</title><style>
body{margin:0;background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;color:#1f2733}.wrap{max-width:1080px;margin:auto;padding:16px 14px 80px}.hero{background:linear-gradient(135deg,#112b52,#1b72d9);color:white;border-radius:24px;padding:24px 18px;box-shadow:0 10px 26px #0002}.hero h1{font-size:25px;margin:0 0 8px}.hero p{margin:0;line-height:1.6;font-size:14px}.card{background:white;border:1px solid #e4e8ee;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 6px 18px #0001}h2{font-size:18px;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:720px){.grid,.metrics{grid-template-columns:1fr!important}.planrow{align-items:flex-start}.meta{white-space:normal!important}}label{font-size:13px;font-weight:800;color:#344054;margin-bottom:6px;display:block}input,select{width:100%;font-size:17px;padding:13px;border:1px solid #cfd4dc;border-radius:13px;background:white}button{width:100%;border:0;border-radius:15px;background:#1769d6;color:white;font-weight:900;font-size:17px;padding:14px;margin-top:12px}.quick{display:flex;gap:8px;overflow:auto;margin:10px 0}.quick button{width:auto;margin:0;border-radius:999px;background:#eef3fb;color:#0f4ea3;font-size:14px;padding:9px 12px;white-space:nowrap}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{background:#f7f9fc;border:1px solid #e2e8f0;border-radius:16px;padding:14px}.k{font-size:12px;color:#667085;font-weight:800}.v{font-size:22px;font-weight:950}.zone{border-radius:16px;padding:14px;margin-top:10px;border:1px solid #e5e7eb}.super{background:#f4f4f5}.red{background:#fff0f0}.amber{background:#fff8e8}.green{background:#eafaf0}.blue{background:#eef6ff}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{background:white;border:1px solid #e5e7eb;border-radius:999px;padding:8px 10px;font-weight:850;font-size:14px}.pill small{color:#667085;font-weight:650}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #e5e7eb;padding:10px 6px;text-align:left;vertical-align:top}th{background:#f9fafb;color:#475467;font-size:12px}td.num{text-align:right;font-variant-numeric:tabular-nums}.hidden{display:none}.planrow{display:flex;gap:8px;align-items:center;border-bottom:1px solid #e5e7eb;padding:9px 4px}.idx{background:#1769d6;color:white;border-radius:50%;min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:800}.idx.local{background:#1f9d57}.nm{flex:1;font-weight:800}.meta{font-size:12px;color:#667085;white-space:nowrap}.badge{color:white;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:800}.b-super{background:#71717a}.b-rush{background:#d93636}.b-stable{background:#b8860b}.b-safe{background:#1f9d57}.b-very{background:#0f4ea3}.note{background:#fff7e6;border:1px solid #e7b84b;color:#9a6b00;border-radius:14px;padding:12px;font-size:13px;line-height:1.65}.time{font-weight:900;color:#0f4ea3}.tag{display:inline-block;background:#eef3fb;border-radius:999px;padding:2px 7px;margin:2px;font-size:12px;color:#0f4ea3}.special{background:#fff7e6;color:#9a6b00}.small{font-size:12px;color:#667085;line-height:1.65}
</style></head><body><div class="wrap"><section class="hero"><h1>Ben Model V17｜區間序位模型</h1><p>改用「序位區間」定位，不再假裝單點精準。支援輸入個人序位區間或會考積分，並以區間重疊判斷大衝／衝／穩／保／超保。</p></section>
<section class="card"><h2>輸入條件</h2><div class="grid"><div><label>個人序位區間起點</label><input id="rankLow" type="number" placeholder="例：14610"></div><div><label>個人序位區間終點</label><input id="rankHigh" type="number" placeholder="例：14735"></div><div><label>會考積分（選填，可自動帶出序位區間）</label><input id="score" type="number" step="0.1" placeholder="例：21.6"></div><div><label>性別視角</label><select id="gender"><option value="all">全部</option><option value="male">男生可填</option><option value="female">女生可填</option></select></div><div><label>資料範圍</label><select id="type"><option value="all">全部</option><option value="高中">高中</option><option value="高職">高職</option></select></div><div><label>前幾志願依落點排序</label><select id="topn"><option>3</option><option>5</option><option>7</option></select></div></div><button id="go">開始分析</button><div class="quick"><button onclick="quickScore(21.6)">21.6</button><button onclick="quickScore(20.6)">20.6</button><button onclick="quickRange(14610,14735)">又丞序位</button><button onclick="quickRange(15383,15697)">20.6區間</button></div><p class="small">若同時輸入「序位區間」與「積分」，系統優先採用序位區間；積分只作參考。</p></section>
<section id="result" class="card hidden"><h2>分析結果</h2><div id="summary"></div><div id="zones"></div></section><section id="planCard" class="card hidden"><h2>30 志願排序草稿</h2><div id="plan"></div></section><section id="compare" class="card hidden"><h2>鄰近校科比較｜區間定位</h2><div id="table"></div></section><section class="card"><h2>V17資料庫</h2><input id="q" placeholder="搜尋：中正、陽明、華江、永平" oninput="renderDB()" style="margin-bottom:10px"><div id="db"></div></section><section class="card"><div class="note"><b>模型提醒：</b>V17採用你提供的115真實序位樣本建立區間模型。同分數會因五科標示、作文與比序項目不同而有序位差異，因此本版以「區間重疊」判斷，比單點模型更符合官方序位查詢邏輯。</div></section></div>
<script>
const TOTAL=52171;
const SCORE_RANGES=[[35.8, 1, 600], [34.0, 1496, 1639], [33.8, 1640, 2063], [33.6, 2191, 2330], [31.8, 3245, 3372], [31.6, 3628, 3877], [30.8, 4146, 4270], [29.8, 4899, 5403], [29.6, 5404, 5529], [28.8, 6031, 6278], [28.6, 6401, 6529], [26.6, 8546, 8799], [24.8, 9831, 9955], [24.6, 10340, 10462], [21.6, 14200, 14750], [20.6, 15383, 15697]];
const schools=[["建國", 34.0, 850, 950, "male", "高中", 30, ["數理強", "競賽強"], ["科學班", "數理資優"]], ["北一女", 33.8, 1500, 1700, "female", "高中", 32, ["數理強", "語文強"], ["數理資優", "語文資優"]], ["師大附中", 33.6, 2200, 2500, "both", "高中", 25, ["校風自由", "多元發展"], ["科學班", "數理資優"]], ["成功", 31.8, 2900, 3200, "male", "高中", 32, ["升學穩定", "男校傳統"], ["數理資優"]], ["中山女", 30.8, 3600, 3900, "female", "高中", 38, ["女校傳統", "語文強"], ["語文資優"]], ["松山", 30.8, 4100, 4500, "both", "高中", 35, ["交通便利", "升學穩定"], ["數理特色"]], ["大同", 29.8, 4700, 5100, "both", "高中", 38, ["市區便利", "升學穩定"], ["數理特色"]], ["政大附中", 28.8, 5200, 5600, "both", "高中", 25, ["校風自由", "國際交流"], ["特色課程"]], ["中崙", 28.6, 5400, 5800, "both", "高中", 40, ["交通便利", "生活機能"], ["特色課程"]], ["板橋", 28.6, 5900, 6400, "both", "高中", 48, ["新北前段", "升學穩定"], ["數理特色"]], ["麗山", 27.8, 6500, 6900, "both", "高中", 55, ["數理強", "科展強"], ["數理資優"]], ["成淵", 27.8, 6700, 7100, "both", "高中", 42, ["市區便利", "校風穩定"], ["特色課程"]], ["大直", 27.8, 7000, 7400, "both", "高中", 45, ["環境佳", "交通便利"], ["特色課程"]], ["和平", 25.8, 7400, 7800, "both", "高中", 22, ["通勤優勢", "文山熱門"], ["數理資優"]], ["海山", 25.6, 7800, 8200, "both", "高中", 52, ["新北熱門", "升學穩定"], ["特色課程"]], ["西松", 24.8, 8400, 8800, "both", "高中", 45, ["交通便利", "社團活躍"], ["國際特色"]], ["明倫", 25.6, 8600, 9200, "both", "高中", 45, ["市區便利", "校風穩定"], ["特色課程"]], ["百齡", 23.8, 9300, 9800, "both", "高中", 52, ["校風穩定", "士林生活圈"], ["特色課程"]], ["北大", 23.6, 9000, 9500, "both", "高中", 70, ["新興校園", "環境佳"], ["特色課程"]], ["內湖", 23.6, 9500, 10000, "both", "高中", 50, ["科技生活圈", "環境佳"], ["數理特色"]], ["景美", 23.0, 10000, 10500, "female", "高中", 12, ["通勤極佳", "女校特色"], ["語文資優"]], ["中正", 22.6, 10600, 11200, "both", "高中", 58, ["校地大", "校風自由"], ["語文資優"]], ["中和", 22.6, 11200, 11800, "both", "高中", 35, ["通勤可接受", "生活機能"], ["特色課程"]], ["陽明", 22.4, 11800, 12250, "both", "高中", 55, ["環境佳", "校風穩定"], ["數理資優"]], ["南湖", 21.8, 12400, 12850, "both", "高中", 55, ["資訊特色", "內湖生活圈"], ["資訊特色"]], ["新莊", 21.1, 13100, 13500, "both", "高中", 58, ["新北大型校", "升學穩定"], ["特色課程"]], ["南港", 20.6, 13600, 14050, "both", "高中", 45, ["交通可接受", "科技生活圈"], ["特色課程"]], ["永平", 20.6, 14100, 14500, "both", "高中", 30, ["通勤可接受", "生活機能"], ["特色課程"]], ["華江", 19.8, 14400, 14850, "both", "高中", 38, ["市區便利", "生活機能"], ["特色課程"]], ["新北", 17.8, 14800, 15200, "both", "高中", 55, ["新北大型校", "升學穩定"], ["特色課程"]], ["丹鳳", 18.8, 15000, 15400, "both", "高中", 62, ["新莊生活圈", "校風穩定"], ["特色課程"]], ["永春", 18.6, 15300, 15700, "both", "高中", 35, ["信義生活圈", "交通便利"], ["特色課程"]], ["新店", 17.8, 17000, 17450, "both", "高中", 18, ["通勤優勢", "新店生活圈"], ["特色課程"]], ["萬芳", 17.6, 17350, 17800, "both", "高中", 18, ["文山近距離", "通勤優勢"], ["特色課程"]], ["錦和", 16.6, 19200, 19600, "both", "高中", 35, ["中和生活圈", "校風穩定"], ["特色課程"]], ["大安高工", 19.8, 13800, 14200, "both", "高職", 25, ["技職強校", "理工實作"], ["技術型高中"]], ["木柵高工", 8.6, 32300, 32700, "both", "高職", 20, ["文山近距離", "技職導向"], ["技術型高中"]]].map(x=>({name:x[0],score:x[1],low:x[2],high:x[3],gender:x[4],type:x[5],commute:x[6],features:x[7],special:x[8]}));
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
function mid(a,b){return Math.round((a+b)/2)}
function rt(a,b){return `${fmt(a)}～${fmt(b)}`}
function scoreToRange(score){if(score===null||isNaN(score))return null;let exact=SCORE_RANGES.find(x=>Number(x[0])===Number(score));if(exact)return {low:exact[1],high:exact[2],source:'真實樣本區間'};let arr=SCORE_RANGES.slice().sort((a,b)=>b[0]-a[0]);if(score>=arr[0][0])return {low:arr[0][1],high:arr[0][2],source:'外推'};if(score<=arr[arr.length-1][0])return {low:arr[arr.length-1][1],high:arr[arr.length-1][2],source:'外推'};for(let i=0;i<arr.length-1;i++){let hi=arr[i],lo=arr[i+1];if(score<=hi[0]&&score>=lo[0]){let t=(hi[0]-score)/(hi[0]-lo[0]);return {low:Math.round(hi[1]+t*(lo[1]-hi[1])),high:Math.round(hi[2]+t*(lo[2]-hi[2])),source:'區間插值'}}}return null}
function getStudentRange(){let lo=parseInt(rankLow.value),hi=parseInt(rankHigh.value),sc=parseFloat(score.value);if(!isNaN(lo)&&!isNaN(hi))return {low:Math.min(lo,hi),high:Math.max(lo,hi),source:'輸入序位區間'};if(!isNaN(lo))return {low:lo,high:lo,source:'輸入單一序位'};return scoreToRange(sc)}
function filtered(){let g=gender.value,t=type.value;return schools.filter(s=>(g==='all'||s.gender==='both'||s.gender===g)&&(t==='all'||s.type===t)).sort((a,b)=>a.low-b.low)}
function judge(stu,sch){let sm=mid(stu.low,stu.high),cm=mid(sch.low,sch.high),gap=cm-sm,over=!(stu.high<sch.low||stu.low>sch.high);if(over||Math.abs(gap)<=800)return {label:'穩',cls:'amber',badge:'b-stable',gap};if(gap<-1500)return {label:'大衝',cls:'super',badge:'b-super',gap};if(gap<-800)return {label:'衝',cls:'red',badge:'b-rush',gap};if(gap>2000)return {label:'超保',cls:'blue',badge:'b-very',gap};if(gap>800)return {label:'保',cls:'green',badge:'b-safe',gap};return {label:'穩',cls:'amber',badge:'b-stable',gap}}
function tagHtml(s){return `<div>${s.features.map(x=>`<span class="tag">${x}</span>`).join('')}<br>${s.special.map(x=>`<span class="tag special">🎓 ${x}</span>`).join('')}</div>`}
function pill(s,stu){let j=judge(stu,s);return `<span class="pill">${s.name}<small> ${rt(s.low,s.high)}｜${j.gap>=0?'+':''}${fmt(j.gap)}｜<span class="time">${s.commute}分</span>｜${j.label}</small></span>`}
function zone(title,cls,arr,stu){return `<div class="zone ${cls}"><h3>${title}</h3><div class="pills">${arr.length?arr.slice(0,16).map(s=>pill(s,stu)).join(''):'無'}</div></div>`}
function run(){let stu=getStudentRange();if(!stu){alert('請輸入個人序位區間，或輸入會考積分');return}let sm=mid(stu.low,stu.high),pl=(stu.low/TOTAL*100).toFixed(2),ph=(stu.high/TOTAL*100).toFixed(2);let L=filtered().map(s=>({...s,j:judge(stu,s)}));let cur=L.find(s=>s.high>=stu.low)||L[L.length-1];let g={super:[],red:[],amber:[],green:[],blue:[]};L.forEach(s=>g[s.j.cls].push(s));summary.innerHTML=`<div class="metrics"><div class="metric"><div class="k">採用序位區間</div><div class="v">${rt(stu.low,stu.high)}</div><div class="small">${stu.source}</div></div><div class="metric"><div class="k">百分位區間</div><div class="v">前 ${pl}%～${ph}%</div><div class="small">母體 ${fmt(TOTAL)}</div></div><div class="metric"><div class="k">區間中位數</div><div class="v">${fmt(sm)}</div></div><div class="metric"><div class="k">理論落點帶</div><div class="v">${cur.name}</div><div class="small">${rt(cur.low,cur.high)}</div></div></div>`;zones.innerHTML=zone('⬛ 大衝區','super',g.super,stu)+zone('🟥 衝刺區','red',g.red,stu)+zone('🟨 穩定區／區間重疊','amber',g.amber,stu)+zone('🟩 保守區','green',g.green,stu)+zone('🟦 超保區','blue',g.blue,stu);renderCompare(stu);renderPlan(stu);result.classList.remove('hidden');compare.classList.remove('hidden');planCard.classList.remove('hidden')}
function renderCompare(stu){let L=filtered().map(s=>({...s,j:judge(stu,s)})),idx=L.findIndex(s=>s.high>=stu.low);if(idx<0)idx=L.length-1;let rows=L.slice(Math.max(0,idx-10),idx+14).map(s=>`<tr><td>${s.name}<br>${tagHtml(s)}</td><td>${s.type}</td><td class="num">${s.score??'-'}</td><td class="num">${rt(s.low,s.high)}</td><td class="num">${s.j.gap>=0?'+':''}${fmt(s.j.gap)}</td><td><span class="badge ${s.j.badge}">${s.j.label}</span></td><td class="num"><span class="time">${s.commute}分</span></td></tr>`).join('');table.innerHTML=`<table><tr><th>校科與特色</th><th>類型</th><th>積分</th><th>學校序位區間</th><th>區間差距</th><th>判定</th><th>通勤</th></tr>${rows}</table>`}
function renderPlan(stu){let n=parseInt(topn.value);let L=filtered().map(s=>({...s,j:judge(stu,s)}));let top=L.filter(s=>['大衝','衝','穩'].includes(s.j.label)).sort((a,b)=>a.low-b.low).slice(0,n);let used=new Set(top.map(s=>s.name));let rest=L.filter(s=>!used.has(s.name)).sort((a,b)=>{let o={'穩':1,'保':2,'超保':3,'衝':4,'大衝':5};return (o[a.j.label]||9)-(o[b.j.label]||9)||a.commute-b.commute});let p=top.concat(rest).slice(0,30);plan.innerHTML=p.map((s,i)=>`<div class="planrow"><span class="idx${i<n?'':' local'}">${i+1}</span><span class="nm">${s.name} <span class="badge ${s.j.badge}">${s.j.label}</span><br><small>${s.features.slice(0,2).join('、')}｜${s.special.slice(0,1).join('、')}</small></span><span class="meta">${rt(s.low,s.high)}｜${s.commute}分</span></div>`).join('')||'目前條件沒有足夠學校。'}
function renderDB(){let kw=q.value.trim();let rows=filtered().filter(s=>!kw||s.name.includes(kw)).map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}<br>${tagHtml(s)}</td><td>${s.type}</td><td class="num">${s.score??'-'}</td><td class="num">${rt(s.low,s.high)}</td><td class="num"><span class="time">${s.commute}分</span></td></tr>`).join('');db.innerHTML=`<table><tr><th>#</th><th>校科與特色</th><th>類型</th><th>積分</th><th>序位區間</th><th>通勤</th></tr>${rows}</table>`}
function quickScore(v){score.value=v;rankLow.value='';rankHigh.value='';run()}
function quickRange(a,b){rankLow.value=a;rankHigh.value=b;score.value='';run()}
go.addEventListener('click',run);['gender','type','topn'].forEach(id=>document.getElementById(id).addEventListener('change',renderDB));renderDB();
</script></body></html>
