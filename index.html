<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基北區高中落點分析 V22</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #111827, #1d4ed8);
      color: white;
      padding: 30px 18px;
      text-align: center;
    }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; opacity: .92; }
    main { max-width: 1200px; margin: 0 auto; padding: 18px; }
    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, .08);
    }
    h2 { margin: 0 0 12px; font-size: 22px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    label { font-weight: 700; font-size: 14px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 5px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button.secondary { background: #475569; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .note {
      background: #eff6ff;
      border-left: 5px solid #2563eb;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .summary div {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e2e8f0;
    }
    .summary strong { display: block; font-size: 22px; }
    .section-title {
      margin: 18px 0 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 18px;
    }
    .dream-title { background: #fee2e2; color: #991b1b; }
    .challenge-title { background: #ffedd5; color: #9a3412; }
    .steady-title { background: #dcfce7; color: #166534; }
    .safe-title { background: #dbeafe; color: #1d4ed8; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f1f5f9; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }
    .safe { background: #dbeafe; color: #1d4ed8; }
    .steady { background: #dcfce7; color: #166534; }
    .challenge { background: #ffedd5; color: #9a3412; }
    .dream { background: #fee2e2; color: #991b1b; }
    .muted { color: #64748b; font-size: 13px; }
    .rank-good { color: #047857; font-weight: 700; }
    .rank-bad { color: #b91c1c; font-weight: 700; }
    .small { font-size: 13px; }
    footer { text-align: center; padding: 24px; color: #64748b; font-size: 13px; }
    @media (max-width: 900px) {
      .grid, .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .grid, .summary { grid-template-columns: 1fr; }
      header h1 { font-size: 23px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
<header>
  <h1>基北區高中落點分析 V22</h1>
  <p>區間制 + 志願排序制｜先判斷落點區間，再依學校強度排序</p>
</header>

<main>
  <section class="card">
    <h2>輸入條件</h2>
    <div class="grid">
      <div>
        <label>會考積分</label>
        <input id="scoreInput" type="number" step="0.1" value="21.6" />
      </div>
      <div>
        <label>個人序位</label>
        <input id="rankInput" type="number" value="14610" />
      </div>
      <div>
        <label>分析角度</label>
        <select id="modeInput">
          <option value="balanced" selected>平衡：正常選填</option>
          <option value="safe">保守：偏安全</option>
          <option value="attack">積極：偏挑戰</option>
        </select>
      </div>
      <div>
        <label>顯示範圍</label>
        <select id="rangeInput">
          <option value="6000" selected>常用：序位前後 6000</option>
          <option value="9000">放寬：序位前後 9000</option>
          <option value="999999">顯示全部</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button onclick="analyze()">更新分析</button>
      <button class="secondary" onclick="resetDefault()">帶入又丞目前資料</button>
    </div>
    <p class="note">
      V22 修正：取消容易誤解的「V21 評分」。高中落點改用四區判斷：
      夢幻、挑戰、穩定、安全。每個區間內再依學校強度排序，所以會維持
      「中正 > 陽明 > 永平」這種較符合志願選填直覺的排序。
    </p>
  </section>

  <section class="card">
    <h2>分析摘要</h2>
    <div id="summary" class="summary"></div>
  </section>

  <section class="card">
    <h2>V22 志願排序建議</h2>
    <div id="groupedResults"></div>
  </section>

  <section class="card">
    <h2>完整學校資料庫</h2>
    <p class="muted">目前先放 V22 內建資料。你之後貼最新資料，我再幫你替換成正式資料庫。</p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>學校</th>
            <th>區域</th>
            <th>參考分數</th>
            <th>序位低標</th>
            <th>序位高標</th>
            <th>中位序位</th>
            <th>強度</th>
            <th>通勤</th>
          </tr>
        </thead>
        <tbody id="dbBody"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>
  V22｜本工具為志願排序輔助模型，正式結果仍需依當年度招生名額、實際填志願人數與錄取公告調整。
</footer>

<script>
const schoolData = [
  { name:"和平高中", area:"北市", score:23.2, rankLow:9000, rankHigh:11200, strength:106, commute:"約 25-50 分", note:"高挑戰參考" },
  { name:"明倫高中", area:"北市", score:22.8, rankLow:10500, rankHigh:12500, strength:103, commute:"約 40-70 分", note:"偏挑戰" },
  { name:"中正高中", area:"北市", score:22.4, rankLow:12200, rankHigh:14200, strength:100, commute:"約 30-60 分", note:"V22：挑戰區優先參考" },
  { name:"陽明高中", area:"北市", score:21.8, rankLow:13800, rankHigh:15800, strength:95, commute:"約 30-60 分", note:"核心參考校" },
  { name:"永平高中", area:"新北", score:21.1, rankLow:14800, rankHigh:17000, strength:88, commute:"約 30-60 分", note:"穩定參考校" },
  { name:"百齡高中", area:"北市", score:20.9, rankLow:15500, rankHigh:17800, strength:86, commute:"約 30-60 分", note:"穩定參考校" },
  { name:"南港高中", area:"北市", score:20.6, rankLow:16500, rankHigh:19000, strength:83, commute:"約 45-75 分", note:"偏穩定" },
  { name:"大安高工", area:"北市", score:20.3, rankLow:17000, rankHigh:21000, strength:82, commute:"約 30-60 分", note:"技高熱門科需另看" },
  { name:"華江高中", area:"北市", score:20.4, rankLow:17200, rankHigh:19800, strength:81, commute:"約 35-70 分", note:"安全區參考" },
  { name:"松山工農", area:"北市", score:20.0, rankLow:18000, rankHigh:22000, strength:77, commute:"約 40-75 分", note:"技高/綜高需另看科別" },
  { name:"育成高中", area:"北市", score:20.1, rankLow:18500, rankHigh:21500, strength:78, commute:"約 45-80 分", note:"安全區參考" },
  { name:"復興高中", area:"北市", score:19.9, rankLow:19500, rankHigh:22500, strength:76, commute:"約 45-80 分", note:"安全區參考" },
  { name:"清水高中", area:"新北", score:19.6, rankLow:20500, rankHigh:23800, strength:73, commute:"約 50-85 分", note:"安全備選" },
  { name:"三民高中", area:"新北", score:19.4, rankLow:21500, rankHigh:25000, strength:71, commute:"約 50-90 分", note:"安全備選" }
];

function midRank(s) {
  return Math.round((s.rankLow + s.rankHigh) / 2);
}

function getThreshold(mode) {
  if (mode === "safe") {
    return { dream: -2500, challenge: -800, steady: 1800 };
  }
  if (mode === "attack") {
    return { dream: -3800, challenge: -1500, steady: 1000 };
  }
  return { dream: -3000, challenge: -1000, steady: 1500 };
}

function classify(s, userScore, userRank, mode) {
  const diff = midRank(s) - userRank;
  const scoreDiff = userScore - s.score;
  const t = getThreshold(mode);

  let level = "safe";
  if (diff < t.dream || scoreDiff < -2.0) level = "dream";
  else if (diff < t.challenge || scoreDiff < -0.8) level = "challenge";
  else if (diff <= t.steady || scoreDiff < 0.7) level = "steady";
  else level = "safe";

  return { level, diff, scoreDiff };
}

function levelMeta(level) {
  const map = {
    dream: { title:"夢幻區", desc:"放前面可以衝，但不要當主力志願。", cls:"dream", titleCls:"dream-title", order:1 },
    challenge: { title:"挑戰區", desc:"有機會，但需要志願策略搭配。", cls:"challenge", titleCls:"challenge-title", order:2 },
    steady: { title:"穩定區", desc:"最適合作為主力志願。", cls:"steady", titleCls:"steady-title", order:3 },
    safe: { title:"安全區", desc:"適合作為保底與備援。", cls:"safe", titleCls:"safe-title", order:4 }
  };
  return map[level];
}

function renderTable(rows, startIndex) {
  if (!rows.length) return '<p class="muted">此區暫無學校。</p>';
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>建議序</th>
            <th>學校</th>
            <th>區域</th>
            <th>參考分數</th>
            <th>參考序位</th>
            <th>序位差</th>
            <th>判斷</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((s, i) => {
            const meta = levelMeta(s.analysis.level);
            const diffText = s.analysis.diff >= 0
              ? `<span class="rank-good">+${s.analysis.diff}</span>`
              : `<span class="rank-bad">${s.analysis.diff}</span>`;
            return `
              <tr>
                <td><strong>${startIndex + i}</strong></td>
                <td><strong>${s.name}</strong></td>
                <td>${s.area}</td>
                <td>${s.score}</td>
                <td>${s.rankLow.toLocaleString()} ~ ${s.rankHigh.toLocaleString()}</td>
                <td>${diffText}</td>
                <td><span class="pill ${meta.cls}">${meta.title}</span></td>
                <td>${s.note || ""}<br><span class="muted">${s.commute || ""}</span></td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function analyze() {
  const userScore = Number(document.getElementById("scoreInput").value);
  const userRank = Number(document.getElementById("rankInput").value);
  const mode = document.getElementById("modeInput").value;
  const range = Number(document.getElementById("rangeInput").value);

  const rows = schoolData
    .map(s => ({ ...s, analysis: classify(s, userScore, userRank, mode) }))
    .filter(s => Math.abs(s.analysis.diff) <= range || Math.abs(userScore - s.score) <= 2.8)
    .sort((a, b) => {
      const ma = levelMeta(a.analysis.level);
      const mb = levelMeta(b.analysis.level);
      if (ma.order !== mb.order) return ma.order - mb.order;
      if (b.strength !== a.strength) return b.strength - a.strength;
      return a.rankLow - b.rankLow;
    });

  const groups = {
    dream: rows.filter(s => s.analysis.level === "dream"),
    challenge: rows.filter(s => s.analysis.level === "challenge"),
    steady: rows.filter(s => s.analysis.level === "steady"),
    safe: rows.filter(s => s.analysis.level === "safe")
  };

  let html = "";
  let index = 1;
  ["dream", "challenge", "steady", "safe"].forEach(level => {
    const meta = levelMeta(level);
    html += `<div class="section-title ${meta.titleCls}">${meta.title}｜${meta.desc}</div>`;
    html += renderTable(groups[level], index);
    index += groups[level].length;
  });

  document.getElementById("groupedResults").innerHTML = html;

  const topSteady = groups.steady[0] ? groups.steady[0].name : "暫無";
  const topChallenge = groups.challenge[0] ? groups.challenge[0].name : "暫無";
  const topSafe = groups.safe[0] ? groups.safe[0].name : "暫無";

  document.getElementById("summary").innerHTML = `
    <div><span class="muted">目前輸入</span><strong>${userScore} 分</strong><span>序位 ${userRank.toLocaleString()}</span></div>
    <div><span class="muted">挑戰首選</span><strong>${topChallenge}</strong><span>可放前段衝刺</span></div>
    <div><span class="muted">主力志願</span><strong>${topSteady}</strong><span>建議作為核心排序</span></div>
    <div><span class="muted">安全備援</span><strong>${topSafe}</strong><span>避免志願落空</span></div>
  `;
}

function renderDb() {
  document.getElementById("dbBody").innerHTML = schoolData
    .slice()
    .sort((a,b) => b.strength - a.strength)
    .map(s => `
      <tr>
        <td><strong>${s.name}</strong></td>
        <td>${s.area}</td>
        <td>${s.score}</td>
        <td>${s.rankLow.toLocaleString()}</td>
        <td>${s.rankHigh.toLocaleString()}</td>
        <td>${midRank(s).toLocaleString()}</td>
        <td>${s.strength}</td>
        <td>${s.commute || ""}</td>
      </tr>
    `).join("");
}

function resetDefault() {
  document.getElementById("scoreInput").value = "21.6";
  document.getElementById("rankInput").value = "14610";
  document.getElementById("modeInput").value = "balanced";
  document.getElementById("rangeInput").value = "6000";
  analyze();
}

renderDb();
analyze();
</script>
</body>
</html>
