const anchors=schools.filter(s=>s.score!=null).map(s=>({score:s.score,rank:s.rank})).sort((a,b)=>b.score-a.score);
function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
function estimateRank(score){if(!score&&score!==0)return null;if(score>=anchors[0].score)return anchors[0].rank;if(score<=anchors[anchors.length-1].score)return anchors[anchors.length-1].rank;for(let i=0;i<anchors.length-1;i++){let hi=anchors[i],lo=anchors[i+1];if(score<=hi.score&&score>=lo.score){let t=(hi.score-score)/(hi.score-lo.score);return Math.round(hi.rank+t*(lo.rank-hi.rank));}}return null}

function info(){let score=parseFloat(document.getElementById('score').value),inputRank=parseInt(rank.value),er=!isNaN(score)?estimateRank(score):null,finalRank=!isNaN(inputRank)?inputRank:er;return{score:isNaN(score)?null:score,inputRank:isNaN(inputRank)?null:inputRank,estRank:er,finalRank}}

function renderCompare(r){

  let rows=arr.map(s=>`<tr><td>${s.name}</td><td>${s.type}</td><td class="num">${s.score??'-'}</td><td class="num">${fmt(s.rank)}</td><td class="num">${s.diff>=0?'+':''}${fmt(s.diff)}</td><td class="num"><span class="time">${s.commute}分</span></td><td><a class="map" target="_blank" href="${mapsUrl(s)}">驗證</a></td></tr>`).join('');

}).join('');
table.innerHTML=html;
}
